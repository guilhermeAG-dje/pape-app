services:
  - type: web
    name: pape
    runtime: python
    plan: free
    buildCommand: python3 -m pip install --no-cache-dir -r requirements.txt
    healthCheckPath: /healthz
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: database.db
      - key: RENDER_DISK_PATH
        value: /var/lib/render/data
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: TRUST_PROXY_HEADERS
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: ENABLE_PUSH_SENDER
        value: "1"
      - key: START_SCHEDULER
        value: "1"
      - key: VAPID_PUBLIC_KEY
        value: "REPLACE_WITH_YOUR_VAPID_PUBLIC_KEY"
      - key: VAPID_PRIVATE_KEY
        generateValue: true
      - key: VAPID_CONTACT
        value: "mailto:you@example.com"
