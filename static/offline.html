<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Offline — LembreMe</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f4ee; color: #1f2937; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { max-width: 28rem; width: 100%; background: white; border-radius: 1rem; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12); padding: 2rem; }
    h1 { margin-top: 0; color: #0f766e; }
    p { line-height: 1.6; }
    .hint { margin-top: 1rem; color: #6b7280; }
    button { margin-top: 1rem; border: 0; border-radius: 999px; background: #0f766e; color: white; padding: 0.8rem 1rem; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sem ligação</h1>
    <p>O LembreMe está offline no momento. Pode continuar a ver a aplicação carregada anteriormente, mas para carregar novos dados precisa de internet.</p>
    <p class="hint">Tente novamente depois de ligar o dispositivo à rede.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
